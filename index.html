<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>IdeaScout | Live Engine</title>
    <style>
        :root { --bg: #000; --text: #fff; --sub: #666; --line: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        header { padding: 80px 60px 40px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: baseline; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1px; background: var(--line); border-bottom: 1px solid var(--line); }
        .card { background: var(--bg); padding: 50px 40px; min-height: 400px; display: flex; flex-direction: column; transition: 0.3s; position: relative; }
        .card:hover { background: #080808; }
        .tag { font-size: 10px; color: var(--sub); margin-bottom: 30px; letter-spacing: 2px; }
        .title { font-size: 22px; line-height: 1.3; margin-bottom: 20px; font-weight: 400; color: #eee; }
        .desc { font-size: 14px; line-height: 1.8; color: var(--sub); flex-grow: 1; }
        .footer { margin-top: 30px; display: flex; justify-content: space-between; font-size: 11px; }
        .btn { color: var(--text); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <h1 style="font-weight:200; letter-spacing:5px;">IDEASCOUT</h1>
        <div style="font-size:10px; color:var(--sub)">右键网页使用“翻成中文”刷全量素材</div>
    </header>
    <div class="grid" id="grid"></div>

    <script>
        async function init() {
            const res = await fetch('./data.json?t=' + Date.now());
            const data = await res.json();
            const container = document.getElementById('grid');
            
            container.innerHTML = data.map(item => `
                <div class="card">
                    <div class="tag">// ${item.type}_STREAM</div>
                    <div class="title">${item.title}</div>
                    <div class="desc">${item.desc}</div>
                    <div class="footer">
                        <a href="${item.url}" target="_blank" class="btn">VIEW SOURCE</a>
                        <div class="btn" onclick="alert('建议SOP：冷峻实录风格。禁用营销号句式。')">SOP HOOK</div>
                    </div>
                </div>
            `).join('');
        }
        init();
    </script>
</body>
</html>
